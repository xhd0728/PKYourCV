services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_BASE_PATH: /pkyourcv
    environment:
      DATABASE_URL: file:./prisma/dev.db
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_BASE_PATH: /pkyourcv
      PORT: 3000
    env_file:
      - .env.production
    restart: unless-stopped
    volumes:
      - pkyourcv_data:/app/prisma

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "52006:80"
    restart: unless-stopped
    volumes:
      - ./deploy/nginx/pkyourcv.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pkyourcv_data:
